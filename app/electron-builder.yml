appId: com.sigmalink.agentorchestrator
productName: SigmaLink
copyright: Copyright © 2026 SigmaLink
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - electron-dist/**/*
  - package.json
# v1.0.1 — native-module packaging fix.
# v1.0.0 shipped with asar packing enabled but no asarUnpack patterns, so
# better-sqlite3's .node file was packed inside the asar archive. Electron
# cannot dlopen .node from inside an asar, and the `bindings` resolver walks
# the filesystem looking for siblings, so the app crashed at first
# `new Database(...)` with `Cannot find module 'bindings'`.
#
# Multiple asarUnpack glob patterns were tried in v1.0.1 development
# (**/*.node, node_modules/<pkg>/**, node_modules/.pnpm/**/<pkg>/**) — all
# successfully unpacked node-pty (which has its own postinstall heuristic in
# electron-builder) but not better-sqlite3 / bindings / file-uri-to-path.
# Root cause appears to be how pnpm content-addressed paths interact with
# electron-builder's pattern matcher.
#
# v1.0.1 ships with asar disabled entirely. The cost is ~50 MB of extra DMG
# size + slightly slower cold-start (more file I/O). The benefit is a 100%
# guarantee that the native modules load. v1.1.0 will re-introduce asar with
# correct unpack patterns once we have a verified glob that works under pnpm.
asar: false
extraResources:
  - from: dist
    to: dist
mac:
  category: public.app-category.developer-tools
  # v1.1.5 — fix Gatekeeper "damaged" dialog on downloaded DMGs.
  #
  # v1.1.0 turned on `hardenedRuntime: true` for SigmaVoice with a comment
  # claiming it was "harmless without a Developer ID". That was wrong. With
  # no signing identity declared, electron-builder's auto-discovery silently
  # produced a bundle whose only signature was the linker-injected ad-hoc
  # one stamped into the Mach-O. The bundle had no
  # `Contents/_CodeSignature/CodeResources` at all, so any quarantined
  # download (Chrome / Safari attaches `com.apple.quarantine` xattr)
  # triggered Gatekeeper's "is damaged and can't be opened" verdict instead
  # of the gentler "unidentified developer" right-click-to-open prompt.
  #
  # electron-builder 24.13.x does NOT parse `identity: "-"` as ad-hoc — it
  # treats it as a keychain identity qualifier and falls back to the same
  # broken state. So v1.1.5 uses `identity: null` (tells builder to skip its
  # own signing pass) plus an `afterSign` hook that calls
  # `codesign --force --deep --sign -` ourselves. The hook writes a proper
  # `_CodeSignature/CodeResources` seal across every Mach-O including the
  # native modules (better-sqlite3.node, node-pty's pty.node, Electron
  # Framework, Squirrel helpers).
  #
  # Hardened runtime is turned OFF in this release. With ad-hoc signing it
  # cannot survive the trust checks anyway, and SigmaVoice's TCC prompts
  # (NSMicrophoneUsageDescription, NSSpeechRecognitionUsageDescription)
  # depend on Info.plist keys, not on hardened runtime.
  #
  # When someone later acquires a Developer ID: drop the afterSign hook,
  # set `identity` to the cert CN, flip `hardenedRuntime: true`, add
  # `notarize: true`, and wire CSC_*/APPLE_ID env vars.
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: "SigmaLink uses your microphone for voice commands."
    NSSpeechRecognitionUsageDescription: "SigmaLink uses speech recognition to dispatch commands to AI agents."
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
win:
  target:
    - target: nsis
      arch: [x64, ia32]
    - target: portable
      arch: [x64]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SigmaLink
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development
# V3-W14-008 — auto-update channel. Targets the public GitHub Releases of the
# SigmaLink repository so `electron-updater` can resolve `latest-mac.yml`,
# `latest.yml`, and `latest-linux.yml` from a single source. macOS code-signing
# is intentionally out-of-scope for v1 — users get an unsigned dmg until a
# Developer ID is attached. The renderer gates the actual update check behind
# `kv['updates.optIn']='1'` (default OFF).
publish:
  provider: github
  owner: s1gmamale1
  repo: SigmaLink
# v1.1.5 — ad-hoc codesign sweep after electron-builder finishes packing.
# See the long comment under `mac:` for context. Hook signature matches
# electron-builder's afterSign contract: receives `{ appOutDir, packager }`
# and runs synchronously before DMG/zip artefacts are produced.
afterSign: scripts/adhoc-sign.cjs
# v1.1.6 — bundle a clear first-launch README inside the DMG. macOS Sequoia
# removed the Control-click → Open Gatekeeper bypass; the dialog now reads
# "Apple could not verify SigmaLink is free of malware". Without a paid
# Apple Developer ID we cannot notarise, so we ship a README explaining
# the two recoverable workarounds (Terminal xattr -cr, or System Settings
# → Privacy & Security → Open Anyway) directly inside the mounted DMG.
dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
    - x: 270
      y: 380
      path: build/dmg/README — Open SigmaLink.txt
      type: file
