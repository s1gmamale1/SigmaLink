appId: com.sigmalink.agentorchestrator
productName: SigmaLink
copyright: Copyright © 2026 SigmaLink
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - electron-dist/**/*
  - package.json
# v1.0.1 — native-module packaging fix.
# `bindings`, `prebuild-install`, `file-uri-to-path`, and the prebuilt `.node`
# binaries for `better-sqlite3` + `node-pty` must live OUTSIDE the asar
# archive. Electron cannot dlopen `.node` files from inside an asar, and the
# `bindings` package walks the filesystem looking for the binary — both fail
# silently when packed, surfacing as `Cannot find module 'bindings'` at first
# `new Database(...)` call. v1.0.0 shipped without this list; v1.0.1 fixes it.
asarUnpack:
  - "**/node_modules/bindings/**"
  - "**/node_modules/file-uri-to-path/**"
  - "**/node_modules/prebuild-install/**"
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/node-pty/**"
extraResources:
  - from: dist
    to: dist
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
win:
  target:
    - target: nsis
      arch: [x64, ia32]
    - target: portable
      arch: [x64]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SigmaLink
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development
# V3-W14-008 — auto-update channel. Targets the public GitHub Releases of the
# SigmaLink repository so `electron-updater` can resolve `latest-mac.yml`,
# `latest.yml`, and `latest-linux.yml` from a single source. macOS code-signing
# is intentionally out-of-scope for v1 — users get an unsigned dmg until a
# Developer ID is attached. The renderer gates the actual update check behind
# `kv['updates.optIn']='1'` (default OFF).
publish:
  provider: github
  owner: s1gmamale1
  repo: SigmaLink
