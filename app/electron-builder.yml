appId: com.sigmalink.agentorchestrator
productName: SigmaLink
copyright: Copyright © 2026 SigmaLink
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - electron-dist/**/*
  - package.json
extraResources:
  - from: dist
    to: dist
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
win:
  target:
    - target: nsis
      arch: [x64, ia32]
    - target: portable
      arch: [x64]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SigmaLink
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development
# V3-W14-008 — auto-update channel. Targets the public GitHub Releases of the
# SigmaLink repository so `electron-updater` can resolve `latest-mac.yml`,
# `latest.yml`, and `latest-linux.yml` from a single source. macOS code-signing
# is intentionally out-of-scope for v1 — users get an unsigned dmg until a
# Developer ID is attached. The renderer gates the actual update check behind
# `kv['updates.optIn']='1'` (default OFF).
publish:
  provider: github
  owner: s1gmamale1
  repo: SigmaLink
