appId: com.sigmalink.agentorchestrator
productName: SigmaLink
copyright: Copyright © 2026 SigmaLink
directories:
  output: release
  buildResources: build
files:
  - dist/**/*
  - electron-dist/**/*
  - package.json
extraResources:
  - from: dist
    to: dist
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
win:
  target:
    - target: nsis
      arch: [x64, ia32]
    - target: portable
      arch: [x64]
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: SigmaLink
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: Development
