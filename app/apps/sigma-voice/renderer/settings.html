<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SigmaVoice Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #1a1a1a;
      color: #e0e0e0;
      padding: 20px;
    }
    h1 { font-size: 18px; margin-bottom: 16px; font-weight: 600; }
    h2 { font-size: 13px; text-transform: uppercase; letter-spacing: 0.5px;
         color: #888; margin: 20px 0 8px; }
    .row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 0; border-bottom: 1px solid #2a2a2a;
    }
    .row:last-child { border-bottom: none; }
    label { flex: 1; }
    input[type="text"] {
      background: #2a2a2a; border: 1px solid #444; border-radius: 4px;
      color: #e0e0e0; padding: 4px 8px; font-size: 12px; width: 180px;
    }
    select {
      background: #2a2a2a; border: 1px solid #444; border-radius: 4px;
      color: #e0e0e0; padding: 4px 8px; font-size: 12px; width: 180px;
    }
    button {
      background: #3a3a3a; border: 1px solid #555; border-radius: 4px;
      color: #e0e0e0; padding: 5px 12px; font-size: 12px; cursor: pointer;
    }
    button:hover { background: #4a4a4a; }
    button.primary { background: #0071e3; border-color: #0071e3; }
    button.primary:hover { background: #0077ed; }
    .status-badge {
      display: inline-block; padding: 2px 8px; border-radius: 10px;
      font-size: 11px; font-weight: 600;
    }
    .status-badge.idle     { background: #2a2a2a; color: #888; }
    .status-badge.recording { background: #c0392b; color: #fff; }
    .status-badge.transcribing { background: #e67e22; color: #fff; }
    .toast {
      position: fixed; bottom: 16px; left: 16px; right: 16px;
      background: #333; border-radius: 6px; padding: 8px 12px;
      font-size: 12px; display: none;
    }
    .toast.info  { border-left: 3px solid #0071e3; }
    .toast.warn  { border-left: 3px solid #e67e22; }
    .toast.error { border-left: 3px solid #c0392b; }
    #toggle-btn { min-width: 90px; text-align: center; }
  </style>
</head>
<body>
  <h1>SigmaVoice</h1>

  <h2>Status</h2>
  <div class="row">
    <label>Capture state</label>
    <span id="state-badge" class="status-badge idle">idle</span>
  </div>
  <div class="row">
    <label>Enabled</label>
    <button id="toggle-btn">Enable</button>
  </div>

  <h2>Hotkey</h2>
  <div class="row">
    <label>Global shortcut</label>
    <input id="hotkey-input" type="text" placeholder="CommandOrControl+Alt+Space" />
  </div>
  <div class="row" style="justify-content:flex-end; padding-top:8px;">
    <button id="hotkey-save-btn">Apply hotkey</button>
  </div>

  <h2>Model</h2>
  <div class="row">
    <label>Whisper model</label>
    <select id="model-select">
      <option value="tiny.en-q5_1">Tiny (31 MB) — fastest</option>
      <option value="base.en-q5_1" selected>Base (57 MB) — recommended</option>
      <option value="small.en-q5_1">Small (182 MB) — better accuracy</option>
      <option value="medium.en-q5_0">Medium (515 MB) — near-large quality</option>
    </select>
  </div>

  <h2>Test</h2>
  <div class="row">
    <label>Manual trigger</label>
    <button id="record-btn">Start recording</button>
  </div>

  <div id="toast" class="toast"></div>

  <script type="module">
    const bv = window.bridgeVoice;
    if (!bv) {
      document.body.innerHTML = '<p style="color:red;padding:20px">SigmaVoice preload not available.</p>';
    }

    // Initial state
    async function refresh() {
      const status = await bv.getStatus();
      if (!status) return;

      const badge = document.getElementById('state-badge');
      badge.textContent = status.state;
      badge.className = 'status-badge ' + status.state;

      const toggleBtn = document.getElementById('toggle-btn');
      toggleBtn.textContent = status.enabled ? 'Disable' : 'Enable';

      document.getElementById('hotkey-input').value = status.hotkey;
      document.getElementById('model-select').value = status.modelId;

      const recordBtn = document.getElementById('record-btn');
      recordBtn.textContent = status.state === 'recording' ? 'Stop & transcribe' : 'Start recording';
    }

    refresh();

    // Live state updates
    bv.onStateChange((status) => {
      const badge = document.getElementById('state-badge');
      badge.textContent = status.state;
      badge.className = 'status-badge ' + status.state;

      const toggleBtn = document.getElementById('toggle-btn');
      toggleBtn.textContent = status.enabled ? 'Disable' : 'Enable';

      const recordBtn = document.getElementById('record-btn');
      recordBtn.textContent = status.state === 'recording' ? 'Stop & transcribe' : 'Start recording';
    });

    // Toast
    function showToast(message, level = 'info') {
      const el = document.getElementById('toast');
      el.textContent = message;
      el.className = 'toast ' + level;
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 4000);
    }

    bv.onToast(({ message, level }) => showToast(message, level));

    // Toggle enable
    document.getElementById('toggle-btn').addEventListener('click', async () => {
      const status = await bv.getStatus();
      await bv.setEnabled(!status?.enabled);
      refresh();
    });

    // Hotkey save
    document.getElementById('hotkey-save-btn').addEventListener('click', async () => {
      const hotkey = document.getElementById('hotkey-input').value.trim();
      if (hotkey) {
        await bv.setHotkey(hotkey);
        showToast('Hotkey updated to: ' + hotkey);
      }
    });

    // Model change
    document.getElementById('model-select').addEventListener('change', async (e) => {
      await bv.setModelId(e.target.value);
    });

    // Manual record
    document.getElementById('record-btn').addEventListener('click', async () => {
      const status = await bv.getStatus();
      if (status?.state === 'recording') {
        await bv.stopAndTranscribe();
      } else {
        await bv.startRecording();
      }
    });
  </script>
</body>
</html>
