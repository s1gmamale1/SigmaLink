name: release-macos

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      attach_to_release:
        description: Attach to the GitHub Release matching this tag (must already exist)
        required: false
        default: 'false'

concurrency:
  group: release-macos-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: build macos installer
    runs-on: macos-14
    timeout-minutes: 30

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'
          cache-dependency-path: app/package.json

      - name: Install (skip postinstall)
        run: pnpm install --no-frozen-lockfile --ignore-scripts
        env:
          npm_config_build_from_source: 'false'

      - name: Install Electron binary
        run: node node_modules/electron/install.js

      - name: Rebuild native modules for Electron
        run: pnpm rebuild better-sqlite3 node-pty

      # v1.4.6 — cross-arch voice prebuild.
      #
      # Build voice-mac for BOTH arches before electron-builder runs so that
      # node-gyp-build resolves the correct binary per DMG at pack time. Without
      # this step, electron-builder's npmRebuild:true falls through to node-gyp
      # rebuild which only targets the runner's native arch (arm64 on macos-14),
      # and that arm64 binary ends up inside the x64 DMG too. On Intel Macs the
      # dlopen fails and voice-mac/index.js returns the no-op stub → renderer
      # falls back to Web Speech API instead of native Speech.framework.
      #
      # Post-pack verification: in dist/mac-x64/*.app/Contents/Resources/app/
      #   native/voice-mac/prebuilds/darwin-x64/@sigmalink+voice-mac.node
      # should be a Mach-O x86_64 bundle; darwin-arm64 should be arm64.
      - name: Prebuild voice-mac for both arches
        working-directory: native/voice-mac
        run: |
          npm install --ignore-scripts
          npx prebuildify --napi --strip --arch=arm64
          npx prebuildify --napi --strip --arch=x64
          ls -la prebuilds/darwin-arm64/ prebuilds/darwin-x64/
          file prebuilds/darwin-arm64/*.node | grep -q "arm64"
          file prebuilds/darwin-x64/*.node  | grep -q "x86_64"
          echo "voice-mac cross-arch prebuilds OK"

      - name: Build renderer + electron
        run: pnpm run build && node scripts/build-electron.cjs

      - name: Build macOS DMG (ad-hoc signed, unnotarized)
        run: pnpm exec electron-builder --mac --publish never

      - name: Upload installer artefacts
        uses: actions/upload-artifact@v4
        with:
          name: sigmalink-macos-installer
          if-no-files-found: error
          retention-days: 30
          path: |
            app/release/*.dmg
            app/release/*.dmg.blockmap
            app/release/*.zip
            app/release/latest-mac.yml

      - name: Attach installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.attach_to_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/release/*.dmg
            app/release/*.dmg.blockmap
            app/release/*.zip
            app/release/latest-mac.yml
          fail_on_unmatched_files: true
