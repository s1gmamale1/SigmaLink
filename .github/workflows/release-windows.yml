name: release-windows

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      attach_to_release:
        description: Attach to the GitHub Release matching this tag (must already exist)
        required: false
        default: 'false'

concurrency:
  group: release-windows-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    name: build windows installer
    runs-on: windows-latest
    timeout-minutes: 30

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'
          cache-dependency-path: app/package.json

      - name: Install (skip postinstall)
        run: pnpm install --no-frozen-lockfile --ignore-scripts
        env:
          npm_config_build_from_source: 'false'

      - name: Install Electron binary
        run: node node_modules/electron/install.js

      - name: Rebuild native modules for Electron
        # Use @electron/rebuild so native modules are compiled against Electron's
        # bundled Node ABI (20.9 in Electron 30), not the host Node ABI (20.16).
        # Modules built against the wrong ABI fail to dlopen in Electron's renderer,
        # causing a React boot crash that makes e2e tests false-green or all-fail.
        run: npx @electron/rebuild -f -w better-sqlite3 -w node-pty -w @sigmalink/voice-win

      - name: Build renderer + electron
        run: pnpm run build && node scripts/build-electron.cjs

      - name: Build Windows NSIS installer (unsigned)
        run: pnpm exec electron-builder --win --publish never

      - name: Upload installer artefacts
        uses: actions/upload-artifact@v4
        with:
          name: sigmalink-windows-installer
          if-no-files-found: error
          retention-days: 30
          path: |
            app/release/*.exe
            app/release/*.exe.blockmap
            app/release/latest.yml

      - name: Attach installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.attach_to_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/release/*.exe
            app/release/*.exe.blockmap
            app/release/latest.yml
          fail_on_unmatched_files: true
