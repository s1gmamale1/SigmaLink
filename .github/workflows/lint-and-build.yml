name: lint-and-build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: lint-and-build-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Opt into Node 24 for JS actions ahead of GitHub's 2026-06-02 forced
  # switch, so any Node-24 incompatibility surfaces in CI before the
  # deadline. Actions are already on current majors; this only changes the
  # Node runtime they execute on.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-build:
    name: lint + build (macos)
    runs-on: macos-14
    timeout-minutes: 15

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'
          cache-dependency-path: app/package.json

      - name: Install (skip postinstall)
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Install Electron binary
        run: node node_modules/electron/install.js

      - name: Lint
        run: pnpm run lint

      - name: Unit tests with coverage
        run: pnpm run coverage

      - name: Brand consistency guard
        working-directory: ${{ github.workspace }}
        run: bash scripts/check-brand.sh

      - name: Build
        run: pnpm run build

  linux-product-check:
    name: product check (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential python3 make g++ pkg-config libsecret-1-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'
          cache-dependency-path: app/package.json

      - name: Install (skip postinstall)
        # --ignore-scripts: product:check (tsc -b + vite + esbuild) needs no
        # compiled natives, and postinstall's electron-builder install-app-deps
        # would try to rebuild the vendored voice-whisper (sources absent) and fail.
        run: pnpm install --no-frozen-lockfile --ignore-scripts

      - name: Product check
        run: pnpm run product:check

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Shellcheck installer
        run: |
          shellcheck app/scripts/install-macos.sh
          shellcheck app/scripts/install-linux.sh
