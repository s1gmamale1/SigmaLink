name: lint-and-build

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: lint-and-build-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-build:
    name: lint + build (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install (frozen lockfile, skip postinstall)
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: pnpm run lint

      - name: Brand consistency guard
        working-directory: ${{ github.workspace }}
        run: bash scripts/check-brand.sh

      - name: Build
        run: pnpm run build
