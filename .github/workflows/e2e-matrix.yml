name: e2e-matrix

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: e2e-matrix-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  # Opt into Node 24 for JS actions ahead of GitHub's 2026-06-02 forced
  # switch, so any Node-24 incompatibility surfaces in CI before the
  # deadline. Actions are already on current majors; this only changes the
  # Node runtime they execute on.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  smoke:
    name: smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-14, ubuntu-latest]

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux runtime dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb libnss3 libatk-bridge2.0-0 libdrm2 libgbm1 libasound2t64 \
            libgtk-3-0 libxss1 libxtst6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'
          cache-dependency-path: app/package.json

      - name: Install (skip postinstall)
        run: pnpm install --no-frozen-lockfile --ignore-scripts
        env:
          npm_config_build_from_source: 'false'

      - name: Install Electron binary
        run: node node_modules/electron/install.js

      - name: Rebuild native modules for Electron
        # Use @electron/rebuild so native modules are compiled against Electron's
        # bundled Node ABI (20.9 in Electron 30), not the host Node ABI (20.16).
        # Modules built against the wrong ABI fail to dlopen in Electron's renderer,
        # causing a React boot crash that makes e2e tests false-green or all-fail.
        # -o (exclusive) so only these two are built; voice-whisper is vendored
        # (whisper.cpp sources absent in CI) + lazy-loaded, so it must NOT be
        # auto-detected here or its node-gyp build hard-fails the whole step.
        run: npx @electron/rebuild -f -o better-sqlite3,node-pty

      - name: Win32 spawn and PTY lifecycle tests
        if: runner.os == 'Windows'
        run: >-
          pnpm exec vitest run
          src/main/core/util
          src/main/core/pty/local-pty.test.ts
          src/main/core/pty/sentinel.test.ts
          src/main/core/pty/registry.test.ts
          src/main/core/pty/registry-lifecycle.test.ts

      - name: Build renderer + electron
        run: pnpm run build && node scripts/build-electron.cjs

      - name: Run Playwright smoke
        if: runner.os != 'Linux'
        run: pnpm exec playwright test --reporter=line,html

      - name: Run Playwright smoke (Linux xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1440x900x24" pnpm exec playwright test --reporter=line,html

      - name: Upload e2e artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ matrix.os }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            app/test-results
            app/playwright-report
            docs/06-test/screenshots
            docs/06-test/visual-summary.json
            docs/06-test/console-output.txt
