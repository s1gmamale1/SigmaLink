name: e2e-matrix

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: e2e-matrix-${{ github.event.pull_request.head.sha || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  smoke:
    name: smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-14, ubuntu-latest]

    defaults:
      run:
        working-directory: app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Install (frozen lockfile, skip postinstall)
        run: pnpm install --frozen-lockfile --ignore-scripts
        env:
          npm_config_build_from_source: 'false'

      - name: Rebuild native modules for Electron
        run: pnpm rebuild better-sqlite3 node-pty

      - name: Install xvfb (Linux)
        if: runner.os == 'Linux'
        working-directory: .
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libdrm2 libgbm1 libasound2t64 || \
          sudo apt-get install -y xvfb libnss3 libatk-bridge2.0-0 libdrm2 libgbm1 libasound2

      - name: Build renderer + electron
        run: pnpm run build && node scripts/build-electron.cjs

      - name: Run Playwright smoke (Linux under xvfb)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1440x900x24" pnpm exec playwright test --reporter=line,html

      - name: Run Playwright smoke (macOS / Windows)
        if: runner.os != 'Linux'
        run: pnpm exec playwright test --reporter=line,html

      - name: Upload e2e artefacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-${{ matrix.os }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            app/test-results
            app/playwright-report
            docs/06-test/screenshots
            docs/06-test/visual-summary.json
            docs/06-test/console-output.txt
